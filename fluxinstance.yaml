apiVersion: fluxcd.controlplane.io/v1
kind: FluxInstance
metadata:
  name: flux
  namespace: flux-system
  annotations:
    fluxcd.controlplane.io/reconcileEvery: 1m
    fluxcd.controlplane.io/reconcileTimeout: 2m
spec:
  distribution:
    version: 2.8.1
    registry: ghcr.io/fluxcd
    artifact: oci://ghcr.io/controlplaneio-fluxcd/flux-operator-manifests
  components:
  - source-controller
  - kustomize-controller
  - helm-controller
  cluster:
    type: kubernetes
    size: medium
    multitenant: false
    networkPolicy: true
    domain: cluster.local
  sync:
    kind: OCIRepository
    url: oci://${kindRegistry}/flux-${clusterName}
    ref: latest
    path: .
    interval: 10s
  kustomize:
    patches:
    - target:
        kind: Kustomization
        name: flux-system
      patch: |-
        - op: add
          path: /spec/force
          value: true
        - op: add
          path: /spec/prune
          value: true
        - op: replace
          path: /spec/interval
          value: 10s
        - op: add
          path: /spec/postBuild
          value:
            substituteFrom:
            - kind: ConfigMap
              name: cluster-vars
              optional: false
    - target:
        kind: OCIRepository
        name: flux-system
      patch: |-
        - op: add
          path: /spec/insecure
          value: true
