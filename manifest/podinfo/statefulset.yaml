apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: podinfo
spec:
  serviceName: podinfo
  replicas: 2
  selector:
    matchLabels:
      app: podinfo
  template:
    metadata:
      labels:
        app: podinfo
    spec:
      containers:
      - name: podinfo
        image: ghcr.io/stefanprodan/podinfo:latest
        command:
        - ./podinfo
        args:
        - --port=9898
        - --cert-path=/data/cert
        - --port-metrics=9797
        - --grpc-port=9999
        - --grpc-service-name=podinfo
        - --level=debug
        - --random-delay=false
        - --random-error=false
        env:
        - name: PODINFO_UI_COLOR
          value: "#34577c"
        ports:
        - name: http
          containerPort: 9898
          protocol: TCP
        - name: http-metrics
          containerPort: 9797
          protocol: TCP
        - name: grpc
          containerPort: 9999
          protocol: TCP
        livenessProbe:
          httpGet:
            path: /healthz
            port: http
        readinessProbe:
          httpGet:
            path: /readyz
            port: http
        volumeMounts:
        - name: data
          mountPath: /data
        resources:
          requests:
            cpu: 1m
            memory: 16Mi
          limits:
            cpu: "1"
            memory: 100Mi
      volumes:
      - name: data
        emptyDir: {}
