apiVersion: v1
kind: Service
metadata:
  name: podinfo
spec:
  clusterIP: None
  selector:
    app: podinfo
  ports:
  - name: http
    port: 9898
    targetPort: http
    protocol: TCP
  - name: http-metrics
    port: 9797
    targetPort: http-metrics
    protocol: TCP
  - name: grpc
    port: 9999
    targetPort: grpc
    protocol: TCP
