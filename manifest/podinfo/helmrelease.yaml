apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: podinfo
spec:
  interval: 1m
  timeout: 2m
  maxHistory: 2

  driftDetection:
    mode: enabled

  releaseName: podinfo

  chart:
    spec:
      chart: podinfo
      ## $ curl -qsS https://stefanprodan.github.io/podinfo/index.yaml | yq .entries.podinfo.0.version
      version: 6.10.2
      sourceRef:
        kind: HelmRepository
        name: podinfo
      reconcileStrategy: ChartVersion

  valuesFrom:
  - kind: ConfigMap
    name: helm-values-podinfo
    valuesKey: values.yaml
