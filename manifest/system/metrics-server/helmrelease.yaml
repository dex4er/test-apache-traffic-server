apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: metrics-server
  namespace: flux-system
spec:
  interval: 1m
  timeout: 2m
  maxHistory: 2
  driftDetection:
    mode: enabled
  releaseName: metrics-server
  targetNamespace: kube-system
  storageNamespace: kube-system
  chart:
    spec:
      interval: 1m
      chart: metrics-server
      ## $ curl -qsS https://kubernetes-sigs.github.io/metrics-server/index.yaml | yq .entries.metrics-server.0.version
      version: 3.13.0
      ## appVersion: 0.8.0
      sourceRef:
        kind: HelmRepository
        name: metrics-server
      reconcileStrategy: ChartVersion
  valuesFrom:
  - kind: ConfigMap
    name: helm-values-metrics-server
    valuesKey: values.yaml
