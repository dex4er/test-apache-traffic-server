apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: system
  namespace: flux-system
spec:
  interval: 10s

  sourceRef:
    kind: OCIRepository
    name: flux-system

  path: system

  force: true
  prune: true
  wait: true
  deletionPolicy: WaitForTermination

  postBuild:
    substituteFrom:
    - kind: ConfigMap
      name: cluster-vars
