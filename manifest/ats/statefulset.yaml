apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: apache-traffic-server
spec:
  serviceName: ats-service
  replicas: 1
  selector:
    matchLabels:
      app: ats
  template:
    metadata:
      labels:
        app: ats
    spec:
      containers:
      - name: ats
        image: trafficserver/trafficserver:latest
        ports:
        - containerPort: 8080
        volumeMounts:
        - name: ats-config
          mountPath: /opt/etc/trafficserver/cache.config
          subPath: cache.config
        - name: ats-config
          mountPath: /opt/etc/trafficserver/header_rewrite.config
          subPath: header_rewrite.config
        - name: ats-config
          mountPath: /opt/etc/trafficserver/hosting.config
          subPath: hosting.config
        - name: ats-config
          mountPath: /opt/etc/trafficserver/ip_allow.yaml
          subPath: ip_allow.yaml
        - name: ats-config
          mountPath: /opt/etc/trafficserver/plugin.config
          subPath: plugin.config
        - name: ats-config
          mountPath: /opt/etc/trafficserver/records.yaml
          subPath: records.yaml
        - name: ats-config
          mountPath: /opt/etc/trafficserver/remap.config
          subPath: remap.config
        - name: ats-config
          mountPath: /opt/etc/trafficserver/storage.config
          subPath: storage.config
        - name: ats-config
          mountPath: /opt/etc/trafficserver/volume.config
          subPath: volume.config
        - name: ats-cache-0
          mountPath: /var/cache/ats/0
        - name: ats-cache-1
          mountPath: /var/cache/ats/1
        - name: ats-logs
          mountPath: /opt/var/log/trafficserver
        resources:
          requests:
            cpu: 500m
            memory: 512Mi
          limits:
            cpu: "2"
            memory: 2Gi
      - name: diags-log
        image: busybox:latest
        command:
        - tail
        - -n+1
        - -f
        - /logs/diags.log
        volumeMounts:
        - name: ats-logs
          mountPath: /logs
      volumes:
      - name: ats-config
        configMap:
          name: ats-config
      - name: ats-logs
        emptyDir: {}
  volumeClaimTemplates:
  - metadata:
      name: ats-cache-0
    spec:
      storageClassName: standard
      accessModes:
      - ReadWriteOnce
      resources:
        requests:
          storage: 300Mi
  - metadata:
      name: ats-cache-1
    spec:
      storageClassName: standard
      accessModes:
      - ReadWriteOnce
      resources:
        requests:
          storage: 300Mi
