apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: ats
  namespace: flux-system
spec:
  interval: 1m

  sourceRef:
    kind: OCIRepository
    name: flux-system

  path: ats

  prune: true
  wait: true
  deletionPolicy: WaitForTermination

  dependsOn:
  - name: namespaces

  postBuild:
    substituteFrom:
    - kind: ConfigMap
      name: cluster-vars
