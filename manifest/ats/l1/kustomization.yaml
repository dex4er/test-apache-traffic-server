# L1 — edge cache tier (RAM-only, no disk storage).
#
# Receives all client traffic via NodePort 31080. For per-pod origins
# (/podinfo-0, /podinfo-1) it uses L2 as a parent proxy (parent.config),
# so misses are satisfied from L2's disk cache rather than going directly
# to origin. Catch-all traffic (/) bypasses L2 and goes straight to origin.
#
# ConfigMap changes trigger automatic pod rollout via Kustomize content hash.

apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: ats
resources:
- statefulset.yaml
- service.yaml
configMapGenerator:
- name: apache-traffic-server-l1-config
  files:
  - files/cache.config
  - files/header_rewrite.config
  - files/ip_allow.yaml
  - files/parent.config
  - files/plugin.config
  - files/records.yaml
  - files/remap.config
  - files/storage.config
images:
- name: trafficserver/trafficserver
  newTag: 10.1.0
