# Apache Traffic Server — L1/L2 hierarchical cache deployment
#
# Traffic flows: Client → L1 (RAM cache, no disk) → L2 (disk cache) → Origin
#
# l1/: edge cache, NodePort 31080, no persistent storage, uses L2 as parent
#      for cacheable upstream origins.
# l2/: backbone cache, ClusterIP-only, two PVCs for disk cache storage.
#
# ConfigMaps are generated separately per tier so that changes to one tier
# do not restart the other.

apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: ats
resources:
- l1
- l2
