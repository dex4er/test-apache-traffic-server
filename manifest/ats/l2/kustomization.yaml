# L2 — backbone cache tier (disk storage, internal-only access).
#
# Receives upstream requests from L1 for per-pod origins (/podinfo-0,
# /podinfo-1). L2 caches responses on disk and returns them to L1.
# L2 is not accessible from outside the cluster (ClusterIP service only).
#
# L1 sends requests with full absolute URLs after its remap step.
# L2 forwards them to origin with remap_required=0 (no remap rules needed).
#
# To wipe the disk cache after changing storage.config or volume.config:
#   kubectl delete pvc -n ats -l app=apache-traffic-server-l2

apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: ats
resources:
- statefulset.yaml
- service.yaml
configMapGenerator:
- name: apache-traffic-server-l2-config
  files:
  - files/cache.config
  - files/header_rewrite.config
  - files/hosting.config
  - files/ip_allow.yaml
  - files/plugin.config
  - files/records.yaml
  - files/remap.config
  - files/storage.config
  - files/volume.config
images:
- name: trafficserver/trafficserver
  newTag: 10.1.0
