records:
  diags:
    debug:
      # Prefix-matched tags that enable debug logging output.
      # Default: http|dns — added "cache" to troubleshoot caching behaviour.

      tags: http|dns|cache

  exec_thread:
    # Maximum number of worker threads. 0 = auto-scale based on CPU count.
    # Default: 0 — set to 2 to limit resource usage in the kind test cluster.

    limit: 2

  http:
    # Ports ATS listens on for HTTP traffic (IPv4 and IPv6).
    # Default: 8080 8080:ipv6 — kept explicit for clarity.

    server_ports: 8080 8080:ipv6

    # Detail level of the Via header added to requests forwarded to origin.
    # Default: 1 — set to 3 for debugging.

    insert_request_via_str: 3

    # Detail level of the Via header added to responses returned to L1.
    # Default: 0 — set to 3 so L1 can propagate Via to the client.

    insert_response_via_str: 3

    cache:
      # Minimum freshness lifetime (seconds) for objects with no explicit expiry,
      # calculated heuristically from Last-Modified age (heuristic_lm_factor).
      # Default: 3600 — lowered to 120 to limit the freshness window for test objects.

      heuristic_min_lifetime: 120

      # Maximum freshness lifetime (seconds) for objects with no explicit expiry.
      # Default: 86400 — set to 120 to cap heuristic cache age on L2.

      heuristic_max_lifetime: 120

      # Maximum age (seconds) of a stale object that may be served on error.
      # Default: 604800 (7 days) — lowered to 300 for testing.

      max_stale_age: 300

      # Maximum size of the in-process RAM cache.
      # Default: -1 (auto ≈ 10% of available RAM). Set explicitly to avoid ATS
      # claiming excessive memory on top of the disk cache. 64Mi = 67108864 bytes.

      ram_cache:
        size: 67108864

  ssl:
    client:
      verify:
        server:
          # Whether ATS verifies TLS certificates of origin servers.
          # Default: DISABLED — set to PERMISSIVE to log issues without blocking.

          policy: PERMISSIVE

  # Number of threads dedicated to scheduled/background tasks.
  # Default: 5 — set to 2 to reduce overhead in the kind test cluster.

  task_threads: 2

  url_remap:
    # L2 receives requests from L1 with absolute URLs (full http://host:port/path).
    # remap_required=0 allows L2 to forward them directly to origin without
    # needing its own remap rules.
    # Default: 1 — set to 0 for parent-proxy operation.

    remap_required: 0
